<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1a17"/>
      <stop offset="0.62" stop-color="#0b0e14"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.6">
      <stop offset="0" stop-color="#18a884" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#18a884" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0" y="0" width="1200" height="6" fill="#18a884"/>

  <!-- logo -->
  <g transform="translate(96 110)">
    <rect width="72" height="72" rx="18" fill="#18a884"/>
    <g transform="translate(36 36) scale(1.5) translate(-12 -12)" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/>
    </g>
    <text x="92" y="50" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#e8ebf1">Career<tspan fill="#18a884">Craft</tspan></text>
  </g>

  <!-- headline -->
  <text x="96" y="300" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="#e8ebf1">Land your next role,</text>
  <text x="96" y="384" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="#18a884">powered by AI.</text>

  <!-- sub -->
  <text x="96" y="450" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="32" fill="#99a2b3">AI resume builder · ATS checker · interview studio</text>

  <!-- chips -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#cbd2dd">
    <rect x="96" y="506" width="232" height="58" rx="29" fill="rgba(255,255,255,0.06)" stroke="#2a3340"/>
    <text x="128" y="544">7 templates</text>
    <rect x="348" y="506" width="270" height="58" rx="29" fill="rgba(255,255,255,0.06)" stroke="#2a3340"/>
    <text x="380" y="544">170+ DSA problems</text>
    <rect x="638" y="506" width="180" height="58" rx="29" fill="rgba(255,255,255,0.06)" stroke="#2a3340"/>
    <text x="670" y="544">Free to start</text>
  </g>
</svg>
